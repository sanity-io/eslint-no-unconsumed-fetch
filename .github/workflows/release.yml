name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release via changesets
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write # changesets/action commits version bumps and tags
      pull-requests: write # changesets/action opens the "Version Packages" PR
      id-token: write # npm OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changesets needs history to compute tags

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # Trusted publishing requires npm >= 11.5.1. Node 24 ships with npm 11.x
      # already, but bumping to latest is cheap insurance.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint
      - run: pnpm run build
      - run: pnpm test

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          title: "chore: release"
          commit: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
