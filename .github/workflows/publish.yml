name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # Trusted publishing requires npm >= 11.5.1. Node 24 ships with npm 11.x
      # already, but bumping to latest is cheap insurance.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint
      - run: pnpm run build
      - run: pnpm test

      - name: Verify release tag matches package.json
        if: github.event_name == 'release'
        run: |
          pkg_version="v$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME}"
          if [ "$pkg_version" != "$tag" ]; then
            echo "::error::Tag $tag does not match package.json version $pkg_version"
            exit 1
          fi

      - name: Publish
        run: npm publish --access public
